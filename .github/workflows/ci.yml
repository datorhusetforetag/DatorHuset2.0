name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  lighthouse:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm install -g @lhci/cli@0.13.x
      - run: |
          npm run preview -- --host 127.0.0.1 --port 4173 &
          for i in {1..20}; do
            if curl -sSf http://127.0.0.1:4173 > /dev/null; then
              break
            fi
            sleep 1
          done
          lhci collect --url=http://127.0.0.1:4173/ --url=http://127.0.0.1:4173/products --url=http://127.0.0.1:4173/cart --numberOfRuns=2
          lhci assert --preset=lighthouse:no-pwa --minScore=0.7

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.11.0
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - name: Snyk Scan
        if: ${{ secrets.SNYK_TOKEN != '' }}
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
